<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14" role="img">
  <title>AgentManager</title>

  <!-- ── pixel cat face (7×7 grid, pixelSize=2) ────────────── -->

  <!-- face fill (cream) -->
  <rect x="2" y="4" width="10" height="8" fill="#FDFAF3"/>

  <!-- ear tips (row 0): amber inner ear -->
  <rect x="2" y="0" width="2" height="2" fill="#F5A623"/>
  <rect x="10" y="0" width="2" height="2" fill="#F5A623"/>

  <!-- ear bases (row 1): dark outline -->
  <rect x="0" y="2" width="4" height="2" fill="#1A1714"/>
  <rect x="10" y="2" width="4" height="2" fill="#1A1714"/>

  <!-- head sides (row 2) -->
  <rect x="0" y="4" width="2" height="2" fill="#1A1714"/>
  <rect x="12" y="4" width="2" height="2" fill="#1A1714"/>

  <!-- eyes row (row 3) -->
  <rect x="0" y="6" width="2" height="2" fill="#1A1714"/>
  <rect x="4" y="6" width="2" height="2" fill="#1A1714"/>
  <rect x="8" y="6" width="2" height="2" fill="#1A1714"/>
  <rect x="12" y="6" width="2" height="2" fill="#1A1714"/>

  <!-- nose row (row 4): amber nose -->
  <rect x="0" y="8" width="2" height="2" fill="#1A1714"/>
  <rect x="6" y="8" width="2" height="2" fill="#F5A623"/>
  <rect x="12" y="8" width="2" height="2" fill="#1A1714"/>

  <!-- mouth row (row 5): two corner dots → ω cat mouth -->
  <rect x="0" y="10" width="2" height="2" fill="#1A1714"/>
  <rect x="4" y="10" width="2" height="2" fill="#1A1714"/>
  <rect x="8" y="10" width="2" height="2" fill="#1A1714"/>
  <rect x="12" y="10" width="2" height="2" fill="#1A1714"/>

  <!-- chin (row 6) -->
  <rect x="0" y="12" width="14" height="2" fill="#1A1714"/>
</svg>
